<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система управления проектами</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-2 bg-white p-8 rounded-2xl shadow-lg border">
            <h2 id="w-title" class="text-2xl font-bold mb-6">Создание проекта (Шаг 1/5)</h2>
            <div id="w-content" class="space-y-4"></div>
            <div class="mt-8 flex justify-between">
                <button id="btn-prev" onclick="moveStep(-1)" class="hidden bg-gray-200 px-6 py-2 rounded-lg">Назад</button>
                <button id="btn-next" onclick="moveStep(1)" class="bg-blue-600 text-white px-6 py-2 rounded-lg">Далее</button>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow border">
                <h3 class="font-bold mb-4">Фильтр задач</h3>
                <select id="f-status" onchange="loadAll()" class="w-full border p-2 rounded-lg">
                    <option value="">Все статусы</option>
                    <option value="0">ToDo</option>
                    <option value="1">InProgress</option>
                    <option value="2">Done</option>
                </select>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow border">
                <h3 class="font-bold mb-4">Проекты</h3>
                <div id="projects-list" class="space-y-2 text-sm"></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow border">
                <h3 class="font-bold mb-4">Задачи</h3>
                <div id="tasks-list" class="space-y-2 text-sm"></div>
            </div>
        </div>
    </div>
    <script src="js/site.js"></script>
</body>
</html>
